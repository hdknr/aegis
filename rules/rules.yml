# Aegis Scan Rules
# Defines dangerous patterns and content-type based rules for aegis-proxy.

dangerous_patterns:
  - name: curl_pipe_bash
    pattern: 'curl\s+.*\|\s*(ba)?sh'
    severity: critical
    description: "Piping curl output directly to shell"

  - name: wget_pipe_sh
    pattern: 'wget\s+.*\|\s*(ba)?sh'
    severity: critical
    description: "Piping wget output directly to shell"

  - name: base64_decode_exec
    pattern: 'base64\s+(-d|--decode).*\|\s*(ba)?sh'
    severity: critical
    description: "Decoding base64 and executing in shell"

  - name: eval_curl
    pattern: 'eval\s+"\$\(curl'
    severity: critical
    description: "Eval with remote code download"

  - name: download_and_exec
    pattern: 'curl.*-o\s+/tmp/.*&&.*sh\s+/tmp/'
    severity: high
    description: "Download to temp and execute"

  - name: python_urllib_exec
    pattern: 'python[23]?\s+-c\s+.*urllib'
    severity: medium
    description: "Python one-liner with urllib"

  - name: perl_reverse_shell
    pattern: 'perl\s+-e\s+.*socket'
    severity: high
    description: "Perl reverse shell pattern"

  - name: netcat_reverse_shell
    pattern: '(nc|ncat|netcat)\s+.*-e\s+/bin/(ba)?sh'
    severity: critical
    description: "Netcat reverse shell"

  - name: bash_reverse_shell
    pattern: 'bash\s+-i\s+>&\s+/dev/tcp/'
    severity: critical
    description: "Bash /dev/tcp reverse shell"

  - name: python_reverse_shell
    pattern: 'python[23]?\s+-c\s+.*socket.*connect'
    severity: critical
    description: "Python reverse shell via socket"

  - name: nmap_scan
    pattern: 'nmap\s+(-[a-zA-Z]+\s+)*[\d\.]+'
    severity: high
    description: "Network scanning with nmap"

  - name: docker_socket_access
    pattern: '/var/run/docker\.sock'
    severity: critical
    description: "Docker socket access attempt"

  - name: proc_sys_write
    pattern: 'echo\s+.*>\s*/proc/'
    severity: critical
    description: "Writing to /proc filesystem"

  - name: etc_passwd_shadow
    pattern: 'cat\s+/etc/(passwd|shadow)'
    severity: high
    description: "Reading system credential files"

  - name: crontab_injection
    pattern: 'crontab\s|/etc/cron'
    severity: high
    description: "Crontab modification attempt"

  - name: ssh_key_exfil
    pattern: 'cat\s+.*\.ssh/(id_rsa|id_ed25519|authorized_keys)'
    severity: critical
    description: "SSH key access attempt"

  # --- JavaScript-specific patterns ---

  # Obfuscation / dynamic code execution
  - name: js_eval_atob
    pattern: 'eval\s*\(\s*atob\s*\('
    severity: critical
    description: "Base64 decode and eval — common JS malware pattern"

  - name: js_eval_fromcharcode
    pattern: 'eval\s*\(\s*String\s*\.\s*fromCharCode'
    severity: critical
    description: "Char-code based eval — obfuscated code execution"

  - name: js_function_constructor
    pattern: 'new\s+Function\s*\([^)]*\+[^)]*\)'
    severity: high
    description: "Function constructor with concatenation — dynamic code generation"

  - name: js_document_write_unescape
    pattern: 'document\s*\.\s*write\s*\(\s*unescape\s*\('
    severity: high
    description: "document.write with unescape — obfuscated HTML/JS injection"

  # Data exfiltration
  - name: js_cookie_exfil_fetch
    pattern: 'document\s*\.\s*cookie.*fetch\s*\(|fetch\s*\(.*document\s*\.\s*cookie'
    severity: critical
    description: "Cookie exfiltration via fetch"

  - name: js_cookie_exfil_xhr
    pattern: 'document\s*\.\s*cookie.*XMLHttpRequest|XMLHttpRequest.*document\s*\.\s*cookie'
    severity: critical
    description: "Cookie exfiltration via XMLHttpRequest"

  - name: js_cookie_exfil_img
    pattern: 'new\s+Image\s*\(\s*\)[\s\S]{0,80}document\s*\.\s*cookie'
    severity: critical
    description: "Cookie exfiltration via Image pixel"

  - name: js_storage_exfil
    pattern: '(localStorage|sessionStorage)\s*\.\s*getItem.*fetch\s*\(|fetch\s*\(.*(localStorage|sessionStorage)\s*\.\s*getItem'
    severity: high
    description: "Storage data exfiltration via fetch"

  # Dynamic script loading
  - name: js_dynamic_script_src
    pattern: 'createElement\s*\(\s*[''"]script[''"]\s*\)[\s\S]{0,120}\.src\s*='
    severity: medium
    description: "Dynamic script element creation with external source"

  # C2 / beacon patterns
  - name: js_websocket_eval
    pattern: 'WebSocket[\s\S]{0,200}eval\s*\(|eval\s*\([\s\S]{0,200}WebSocket'
    severity: critical
    description: "WebSocket combined with eval — C2 communication pattern"

  - name: js_beacon_interval
    pattern: 'setInterval\s*\(\s*function[\s\S]{0,200}fetch\s*\(\s*[''"]https?://'
    severity: high
    description: "Periodic fetch beacon — potential C2 heartbeat"

content_type_rules:
  scan_required:
    - "application/x-executable"
    - "application/x-sharedlib"
    - "application/x-mach-binary"
    - "application/octet-stream"
    - "application/gzip"
    - "application/zip"
    - "application/x-tar"
  pattern_check:
    - "text/x-shellscript"
    - "text/x-python"
  pass_through:
    - "text/html"
    - "text/plain"
    - "application/json"
